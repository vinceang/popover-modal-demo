<div class="overlay-container" [class.expanded]="expanded">
    <!-- Header -->
    <div class="overlay-header">
        <h3 class="overlay-title">{{ person.name }}</h3>
        <button class="icon-btn expand-btn" (click)="toggleExpand()" [title]="expanded ? 'Shrink' : 'Expand'">
            @if (expanded) {
            <!-- Shrink icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4 14 10 14 10 20" />
                <polyline points="20 10 14 10 14 4" />
                <line x1="14" y1="10" x2="21" y2="3" />
                <line x1="3" y1="21" x2="10" y2="14" />
            </svg>
            } @else {
            <!-- Expand icon -->
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 3 21 3 21 9" />
                <polyline points="9 21 3 21 3 15" />
                <line x1="21" y1="3" x2="14" y2="10" />
                <line x1="3" y1="21" x2="10" y2="14" />
            </svg>
            }
        </button>
    </div>

    <!-- Body -->
    <div class="overlay-body">
        <div class="info-row">
            <span class="label">Role</span>
            <span class="value">{{ person.role }}</span>
        </div>
        <div class="info-row">
            <span class="label">Email</span>
            <span class="value">{{ person.email }}</span>
        </div>
        <div class="info-row">
            <span class="label">Dept</span>
            <span class="value">{{ person.department }}</span>
        </div>

        @if (expanded) {
        <div class="expanded-content">
            <div class="info-row">
                <span class="label">Location</span>
                <span class="value">{{ person.location }}</span>
            </div>
            <div class="bio-section">
                <span class="label">Bio</span>
                <p class="bio-text">{{ person.bio }}</p>
            </div>
        </div>
        }
    </div>

    <!-- Footer close button -->
    <div class="overlay-footer">
        <button class="close-btn" (click)="onClose.emit()">Close</button>
    </div>
</div>
